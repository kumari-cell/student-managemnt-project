<!DOCTYPE html>
<html>
<head>
    <title>Fees Details</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .container { width: 80%; margin: 30px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px gray; }
        h2 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ccc; }
        th { background: #2604e7; color: white; padding: 10px; }
        td { text-align: center; padding: 10px; }
        .paid { color: green; font-weight: bold; }
        .pending { color: red; font-weight: bold; }
        .summary { margin-top: 20px; padding: 15px; background: #eef; border-radius: 10px; text-align: center; font-size: 18px; }
        .btn { display: block; width: 200px; margin: 20px auto; padding: 10px; background: #2604e7; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: black; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="feeHeading">Fees Details</h2>

    <table>
        <thead>
            <tr>
                <th>Fee Type</th>
                <th>Total Amount</th>
                <th>Paid</th>
                <th>Due</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="feeTableBody">
            </tbody>
    </table>

    <div class="summary" id="feeSummary">
        </div>

    <button class="btn" onclick="goBack()">Back to Dashboard</button>
</div>

<script>
    async function fetchFees() {
        // Login ayyaka localStorage lo unna studentId ni teeskuntundi
        const studentId = localStorage.getItem("studentId") || "24B11DS041"; 

        try {
            const response = await fetch(`/api/student-details/${studentId}`);
            const data = await response.json();

            if (data.error || !data.fees) {
                document.getElementById('feeSummary').innerHTML = "<p>Fee records not found.</p>";
                return;
            }

            const fee = data.fees;
            const stu = data.student;
            document.getElementById('feeHeading').innerText = `Fees Details for ${stu.name}`;

            // Calculation logic (Mee model prakaram)
            let totalAmount = fee.totalFee || 50000;
            let paidAmount = fee.paidAmount || 0;
            let dueAmount = totalAmount - paidAmount;
            let status = dueAmount <= 0 ? "Paid" : "Pending";
            let statusClass = dueAmount <= 0 ? "paid" : "pending";

            // Table body update
            const tableBody = document.getElementById('feeTableBody');
            tableBody.innerHTML = `
                <tr>
                    <td>Course Tuition Fee</td>
                    <td>₹${totalAmount}</td>
                    <td>₹${paidAmount}</td>
                    <td>₹${dueAmount}</td>
                    <td class="${statusClass}">${status}</td>
                </tr>
            `;

            // Summary update
            document.getElementById('feeSummary').innerHTML = `
                <p><b>Total Fees:</b> ₹${totalAmount}</p>
                <p><b>Total Paid:</b> ₹${paidAmount}</p>
                <p><b>Total Due:</b> ₹${dueAmount}</p>
                <p><b>Status:</b> <span class="${statusClass}">${status}</span></p>
            `;

        } catch (err) {
            console.error("Error fetching fees:", err);
        }
    }

    window.onload = fetchFees;

    function goBack() {
        window.location.href = "studentdashboard.html";
    }
</script>

</body>
</html>
